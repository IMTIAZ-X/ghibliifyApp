name: Debug Build HabitFlow Pro

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Type check
        run: npx tsc --noEmit

  build-web:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Install web dependencies
        run: npx expo install react-native-web react-dom @expo/metro-runtime
      - name: Export web
        run: npx expo export:web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build

  build-android-debug:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # Create missing asset files (if not present) – required for prebuild
      - name: Ensure assets folder exists
        run: |
          mkdir -p assets
          if [ ! -f assets/icon.png ]; then
            echo "Creating placeholder icon.png"
            # Create a 1x1 transparent PNG (base64)
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
          fi
          if [ ! -f assets/adaptive-icon.png ]; then
            echo "Creating placeholder adaptive-icon.png"
            cp assets/icon.png assets/adaptive-icon.png
          fi
          if [ ! -f assets/splash.png ]; then
            echo "Creating placeholder splash.png"
            cp assets/icon.png assets/splash.png
          fi
          if [ ! -f assets/favicon.png ]; then
            echo "Creating placeholder favicon.png"
            cp assets/icon.png assets/favicon.png
          fi

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
